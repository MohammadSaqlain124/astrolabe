services:
  - type: web
    name: astrolabe
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt && python -c 'import app.core.sky'"
    startCommand: "python init_db.py && uvicorn app.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
